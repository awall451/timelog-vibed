services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      TIMELOG_DB: /data/timelog.db
    volumes:
      - ./data:/data
      - /etc/localtime:/etc/localtime:ro

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - /etc/localtime:/etc/localtime:ro
